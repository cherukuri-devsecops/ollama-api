  #       if: always()
  #       with:
  #         sarif_file: trivy-results.sarif

  deploy:
    needs: [build-ollama]
    runs-on: arc-runner-set
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> "$GITHUB_ENV"

      - name: Helm upgrade
        run: |
          helm upgrade --install ollama-api ./helm/ollama-api \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --set ollamaApi.image.repository=${{ env.APP_IMAGE }} \
            --set ollamaApi.image.tag=${{ needs.build-ollama.outputs.image_tag }} \
            --set ollamaApi.image.pullPolicy=Always \
            --rollback-on-failure \
            --timeout 20m \
            --wait \
            --history-max 5

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/ollama-api-api \
            --namespace ${{ env.NAMESPACE }} \
            --timeout=120s
          kubectl rollout status deployment/ollama-api-ollama \
            --namespace ${{ env.NAMESPACE }} \
            --timeout=600s

      - name: Smoke test
        run: |
          curl -s -f https://ollama-api.cloud-devsecops.com/health || exit 1
