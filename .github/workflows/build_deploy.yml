name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  APP_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/ollama-api
  NAMESPACE: ollama-api
jobs:
  build-ollama:
    runs-on: arc-runner-set
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build app image
        run: |
          docker build \
            --build-arg GIT_SHA=${{ github.sha }} \
            -f Dockerfile \
            -t $APP_IMAGE:${{ steps.meta.outputs.image_tag }} .

      - name: Push app image
        run: docker push $APP_IMAGE:${{ steps.meta.outputs.image_tag }}

  # ── Security scan ─────────────────────────────────────────────────────────
