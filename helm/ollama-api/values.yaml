namespace: ollama-api

nameOverride: ""
fullnameOverride: ""

ollama:
  image:
    repository: ollama/ollama
    tag: latest
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 11434

  resources:
    requests:
      memory: "12Gi"
      cpu: "2"
    limits:
      memory: "16Gi"
      cpu: "4"

  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteMany
    size: 25Gi
    nfsServer: "10.0.0.40"
    nfsPath: /data/nfs/ollama

  # Set gpu.enabled: true and configure runtimeClassName for NVIDIA GPU nodes
  gpu:
    enabled: false
    count: 1
    runtimeClassName: nvidia   # used only when gpu.enabled is true

  livenessProbe:
    httpGet:
      path: /api/tags
      port: 11434
    initialDelaySeconds: 60
    periodSeconds: 20
    failureThreshold: 10

  readinessProbe:
    httpGet:
      path: /api/tags
      port: 11434
    initialDelaySeconds: 60
    periodSeconds: 15
    failureThreshold: 10

  # Seconds Kubernetes waits for the deployment to make progress before marking it Failed.
  # ollama/ollama is a large image; 900s gives room for a cold pull + probe warmup.
  progressDeadlineSeconds: 900

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

ollamaApi:
  image:
    repository: ollama-api     # replace with your registry image, e.g. ghcr.io/you/ollama-api
    tag: latest
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: LoadBalancer
    port: 80
    targetPort: 8000
    loadBalancerIP: "10.0.0.243"

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  # Overrides the auto-derived Ollama service URL when set
  ollamaBaseUrl: ""

  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 5

  readinessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

ingress:
  enabled: false
  className: nginx
  host: ""        # e.g. ollama-api.example.com — leave empty for catch-all
  path: /
