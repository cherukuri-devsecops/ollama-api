apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ollama-api.ollama.fullname" . }}
  labels:
    {{- include "ollama-api.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  replicas: {{ .Values.ollama.replicaCount }}
  progressDeadlineSeconds: {{ .Values.ollama.progressDeadlineSeconds }}
  selector:
    matchLabels:
      {{- include "ollama-api.ollama.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ollama-api.ollama.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.ollama.gpu.enabled }}
      runtimeClassName: {{ .Values.ollama.gpu.runtimeClassName }}
      {{- end }}
      containers:
        - name: ollama
          image: "{{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag }}"
          imagePullPolicy: {{ .Values.ollama.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
          resources:
            {{- if .Values.ollama.gpu.enabled }}
            requests:
              {{- toYaml .Values.ollama.resources.requests | nindent 14 }}
              nvidia.com/gpu: {{ .Values.ollama.gpu.count | quote }}
            limits:
              {{- toYaml .Values.ollama.resources.limits | nindent 14 }}
              nvidia.com/gpu: {{ .Values.ollama.gpu.count | quote }}
            {{- else }}
            requests:
              {{- toYaml .Values.ollama.resources.requests | nindent 14 }}
            limits:
              {{- toYaml .Values.ollama.resources.limits | nindent 14 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.ollama.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.ollama.readinessProbe | nindent 12 }}
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
        - name: ollama-api
          image: "{{ .Values.ollamaApi.image.repository }}:{{ .Values.ollamaApi.image.tag }}"
          imagePullPolicy: {{ .Values.ollamaApi.image.pullPolicy }}
          ports:
            - name: api
              containerPort: 8000
              protocol: TCP
          env:
            - name: OLLAMA_BASE_URL
              value: "http://localhost:11434"
          resources:
            requests:
              {{- toYaml .Values.ollamaApi.resources.requests | nindent 14 }}
            limits:
              {{- toYaml .Values.ollamaApi.resources.limits | nindent 14 }}
          livenessProbe:
            {{- toYaml .Values.ollamaApi.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.ollamaApi.readinessProbe | nindent 12 }}
      volumes:
        - name: ollama-data
          {{- if .Values.ollama.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "ollama-api.ollama.fullname" . }}-models
          {{- else }}
          emptyDir: {}
          {{- end }}
